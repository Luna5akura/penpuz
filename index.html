<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/lunasakura.png" />
    <meta name="theme-color" content="#f8f1e3" />
    <meta name="description" content="每日更新的纸笔谜题站点，支持 Nurikabe、Fillomino 与 Yajilin 在线游玩。" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日纸笔谜题 | PenPuz Today</title>
    
    <!-- dev 分支切换逻辑：检测 ?dev=true 并重定向至 /dev/ 子路径 -->
    <script>
      (() => {
        const urlParams = new URLSearchParams(location.search);
        if (urlParams.get('dev') === 'true') {
          if (!location.pathname.startsWith('/dev')) {
            // 清理 dev 参数，保留其他参数
            urlParams.delete('dev');
            const newSearch = urlParams.toString() ? '?' + urlParams.toString() : '';
            const target = `/dev${location.pathname}${newSearch}${location.hash}`;
            location.replace(target);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
