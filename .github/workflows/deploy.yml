name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build main branch version (生产环境 → 根路径)
        run: pnpm run build

      - name: Debug - list dist after main build
        run: ls -la dist/

      - name: Build dev branch version (开发环境 → /dev/ 子路径)
        run: |
          git checkout dev
          pnpm exec vite build --base=/dev/ --outDir dist/dev
          git checkout main

      - name: Debug - list dist after dev build
        run: ls -R dist/   # 关键调试：确认 dist/dev/index.html 是否生成

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4